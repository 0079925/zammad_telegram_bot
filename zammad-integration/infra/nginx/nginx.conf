worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS: Telegram Gateway ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com;   # TODO: replace with your domain

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Telegram Bot API only calls /webhook/telegram
        location /webhook/telegram {
            proxy_pass         http://telegram-gateway:8080;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;

            # Restrict to Telegram IP ranges (optional but recommended)
            # allow 149.154.160.0/20;
            # allow 91.108.4.0/22;
            # deny all;
        }

        # Zammad trigger webhooks (internal — restrict by IP)
        location /webhook/zammad/ {
            # TODO: replace with your Zammad server IP
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass         http://telegram-gateway:8080;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Health check (public)
        location /health {
            proxy_pass http://telegram-gateway:8080;
        }

        location / {
            return 404;
        }
    }
}
