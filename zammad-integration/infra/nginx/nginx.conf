worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    # ── Upstream: Zammad Rails app ────────────────────────────────────────────
    upstream zammad-web {
        server zammad-web:3000;
    }

    # ── Upstream: Zammad WebSocket ────────────────────────────────────────────
    upstream zammad-websocket {
        server zammad-websocket:6042;
    }

    # ── Upstream: Telegram Gateway ───────────────────────────────────────────
    upstream telegram-gateway {
        server telegram-gateway:8080;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com;   # TODO: replace with your actual domain

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        client_max_body_size 50M;

        # ── Zammad WebSocket ──────────────────────────────────────────────────
        location /cable {
            proxy_pass         http://zammad-websocket;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 86400s;   # keep WS open
        }

        # ── Telegram webhook (inbound from Telegram Bot API) ──────────────────
        location /webhook/telegram {
            proxy_pass         http://telegram-gateway;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;

            # Optional: restrict to Telegram IP ranges
            # allow 149.154.160.0/20;
            # allow 91.108.4.0/22;
            # deny all;
        }

        # ── Zammad → Gateway webhooks (inbound from Zammad triggers) ──────────
        location /webhook/zammad/ {
            proxy_pass         http://telegram-gateway;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;

            # TODO: restrict to Zammad server IP
            # allow <zammad_server_ip>;
            # deny all;
        }

        # ── Gateway health ────────────────────────────────────────────────────
        location /health {
            proxy_pass http://telegram-gateway;
            access_log off;
        }

        # ── Zammad app (catch-all) ────────────────────────────────────────────
        location / {
            proxy_pass         http://zammad-web;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_buffering    off;
        }
    }
}
