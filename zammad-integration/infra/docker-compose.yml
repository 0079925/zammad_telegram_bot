version: "3.9"

# ============================================================
#  Full Zammad Stack
#
#  Services:
#    postgresql      — Zammad database
#    redis           — Zammad cache / ActionCable
#    elasticsearch   — Zammad full-text search
#    zammad-init     — one-shot DB init (runs & exits)
#    zammad-web      — Rails app server (Puma)
#    zammad-worker   — Background job worker
#    zammad-websocket — ActionCable WebSocket server
#    zammad-scheduler — Scheduled jobs (SLA checks, escalations)
#    telegram-gateway — Telegram ↔ Zammad bridge (our service)
#    nginx           — TLS termination + reverse proxy
# ============================================================

x-zammad-env: &zammad-env
  ZAMMAD_RAILSSERVER_HOST: zammad-web
  ZAMMAD_WEBSOCKET_HOST: zammad-websocket
  POSTGRESQL_HOST: postgresql
  POSTGRESQL_PORT: 5432
  POSTGRESQL_USER: ${POSTGRES_USER:-zammad}
  POSTGRESQL_PASS: ${POSTGRES_PASSWORD:-zammad}
  POSTGRESQL_DB: ${POSTGRES_DB:-zammad}
  REDIS_URL: redis://redis:6379
  ELASTICSEARCH_HOST: elasticsearch
  ELASTICSEARCH_PORT: 9200
  ELASTICSEARCH_ENABLED: "true"
  ZAMMAD_SECRET_KEY_BASE: ${ZAMMAD_SECRET_KEY_BASE:-changeme_use_64_random_chars}
  RAILS_ENV: production
  RAILS_SERVE_STATIC_FILES: "true"


services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:15-alpine
    container_name: zammad-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zammad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zammad}
      POSTGRES_DB: ${POSTGRES_DB:-zammad}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    networks:
      - zammad-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zammad}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zammad-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    networks:
      - zammad-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Elasticsearch ────────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: zammad-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - zammad-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ── Zammad Init (one-shot) ───────────────────────────────────────────────────
  # Runs DB migrations and seeds, then exits. Only needed on first start.
  zammad-init:
    image: ghcr.io/zammad/zammad:${ZAMMAD_VERSION:-6.3}
    container_name: zammad-init
    restart: on-failure
    command: ["zammad-init"]
    environment:
      <<: *zammad-env
    volumes:
      - zammad-data:/opt/zammad
    networks:
      - zammad-net
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # ── Zammad Web (Rails / Puma) ────────────────────────────────────────────────
  zammad-web:
    image: ghcr.io/zammad/zammad:${ZAMMAD_VERSION:-6.3}
    container_name: zammad-web
    restart: unless-stopped
    command: ["zammad-web"]
    environment:
      <<: *zammad-env
    volumes:
      - zammad-data:/opt/zammad
    networks:
      - zammad-net
    expose:
      - "3000"
    depends_on:
      zammad-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Zammad Worker (Sidekiq) ──────────────────────────────────────────────────
  zammad-worker:
    image: ghcr.io/zammad/zammad:${ZAMMAD_VERSION:-6.3}
    container_name: zammad-worker
    restart: unless-stopped
    command: ["zammad-worker"]
    environment:
      <<: *zammad-env
    volumes:
      - zammad-data:/opt/zammad
    networks:
      - zammad-net
    depends_on:
      zammad-web:
        condition: service_healthy

  # ── Zammad WebSocket (ActionCable) ───────────────────────────────────────────
  zammad-websocket:
    image: ghcr.io/zammad/zammad:${ZAMMAD_VERSION:-6.3}
    container_name: zammad-websocket
    restart: unless-stopped
    command: ["zammad-websocket"]
    environment:
      <<: *zammad-env
    volumes:
      - zammad-data:/opt/zammad
    networks:
      - zammad-net
    expose:
      - "6042"
    depends_on:
      zammad-web:
        condition: service_healthy

  # ── Zammad Scheduler ────────────────────────────────────────────────────────
  # Handles SLA escalations, scheduled notifications, etc.
  zammad-scheduler:
    image: ghcr.io/zammad/zammad:${ZAMMAD_VERSION:-6.3}
    container_name: zammad-scheduler
    restart: unless-stopped
    command: ["zammad-scheduler"]
    environment:
      <<: *zammad-env
    volumes:
      - zammad-data:/opt/zammad
    networks:
      - zammad-net
    depends_on:
      zammad-web:
        condition: service_healthy

  # ── Telegram Gateway (our service) ──────────────────────────────────────────
  telegram-gateway:
    build:
      context: ../telegram-gateway
      dockerfile: Dockerfile
    container_name: telegram-gateway
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/gateway.db
      ZAMMAD_URL: http://zammad-web:3000
    volumes:
      - gateway-data:/data
    networks:
      - zammad-net
    expose:
      - "8080"
    depends_on:
      zammad-web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx (TLS termination + reverse proxy) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - zammad-net
    depends_on:
      zammad-web:
        condition: service_healthy
      telegram-gateway:
        condition: service_healthy


# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgresql-data:
  redis-data:
  elasticsearch-data:
  zammad-data:
  gateway-data:


# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  zammad-net:
    driver: bridge
